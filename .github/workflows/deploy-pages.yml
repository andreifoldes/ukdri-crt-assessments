name: Test and deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run unit tests (gate deploy on green)
        run: node --test webapp/tests/*.test.js

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Inject runtime config from secrets
        run: |
          sed -i "s#__SHEET_ENDPOINT__#${{ secrets.SHEET_ENDPOINT }}#" webapp/js/config.js
          sed -i "s#__SHEET_FORM_ID__#${{ secrets.SHEET_FORM_ID }}#" webapp/js/config.js

      - name: Upload the webapp as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
